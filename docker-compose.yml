version: "3.8"

services:
  postgres:
    image: postgres:17
    container_name: tower-game-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tower_game
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - tower_game_pgdata:/var/lib/postgresql/data
    networks:
      - tower-game

  backend:
    build:
      context: ./backend
    container_name: tower-game-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/tower_game
      CORS_ORIGIN: https://tower.i-digit.me
      GAME_PROOF_SECRET: tower_game_local_dev_secret_change_me_123456
    depends_on:
      - postgres
    networks:
      - tower-game
      - traefik

  frontend:
    build:
      context: ./frontend
    container_name: tower-game-frontend
    restart: unless-stopped
    depends_on:
      - backend

    labels:
      - "traefik.enable=true"

      # HTTP → HTTPS
      - "traefik.http.routers.tower.rule=Host(`tower.i-digit.me`)"
      - "traefik.http.routers.tower.entrypoints=web"
      - "traefik.http.routers.tower.middlewares=redirect-to-https"

      # HTTPS
      - "traefik.http.routers.tower-secure.rule=Host(`tower.i-digit.me`)"
      - "traefik.http.routers.tower-secure.entrypoints=websecure"
      - "traefik.http.routers.tower-secure.tls=true"
      - "traefik.http.routers.tower-secure.tls.certresolver=letsencrypt"

      # порт внутри контейнера
      - "traefik.http.services.tower.loadbalancer.server.port=80"

      # redirect middleware
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

    networks:
      - tower-game
      - traefik

volumes:
  tower_game_pgdata:

networks:
  tower-game:
  traefik:
    external: true