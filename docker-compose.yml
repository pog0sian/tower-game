name: tower-game

services:
  postgres:
    image: postgres:17
    container_name: tower-game-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tower_game
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - tower_game_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tower_game"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - tower-game

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tower-game-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      COOKIE_SECURE: "false"
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/tower_game
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      GAME_PROOF_SECRET: ${GAME_PROOF_SECRET:-tower_game_local_dev_secret_change_me_123456}
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - tower-game

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: tower-game-frontend
    restart: unless-stopped
    environment:
      PORT: 80
      API_ORIGIN: http://backend:3001
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1/health').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - tower-game

volumes:
  tower_game_pgdata:

networks:
  tower-game:
    driver: bridge
